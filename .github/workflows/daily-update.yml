name: ROOT 母婴产品行业新闻 — 每日更新

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['scripts/**', '.github/workflows/**']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 同步远程最新代码
        run: git pull origin main

      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - name: 抓取新闻 & 生成页面
        run: node scripts/build.js

      - name: 推送更新
        run: |
          git config user.name "ROOT-Bot"
          git config user.email "bot@rootglobal.net"
          git add index.html
          if git diff --staged --quiet; then
            echo "无变化，跳过提交"
            exit 0
          fi
          git commit -m "📰 ROOT 母婴新闻更新 $(TZ='Asia/Shanghai' date '+%Y-%m-%d')"
          # 重试推送最多3次，处理并发冲突
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then
              echo "✅ 推送成功"
              exit 0
            fi
            echo "⚠️ 推送失败，第${i}次重试..."
            sleep 2
          done
          echo "❌ 推送失败" && exit 1
