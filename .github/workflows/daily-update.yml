name: ROOT 母婴产品行业新闻 — 每日更新

on:
  schedule:
    - cron: '0 0 * * *'  # 北京时间每天 08:00
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['scripts/**', '.github/workflows/**']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: 抓取新闻 & 生成页面
        run: node scripts/build.js
      - name: 推送更新
        run: |
          git config user.name "ROOT-Bot"
          git config user.email "bot@rootglobal.net"
          git add index.html
          if git diff --staged --quiet; then
            echo "无变化，跳过提交"
          else
            git commit -m "📰 ROOT 母婴新闻更新 $(TZ='Asia/Shanghai' date '+%Y-%m-%d')"
            git push
          fi
